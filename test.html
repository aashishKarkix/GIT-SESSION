<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --card: #fff;
        --accent: #2b6ef6;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        font-family:
          Inter,
          system-ui,
          Segoe UI,
          Roboto,
          "Helvetica Neue",
          Arial;
      }
      body {
        background: linear-gradient(180deg, var(--bg), #eef3ff);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        width: 100%;
        max-width: 420px;
        padding: 28px;
      }
      .card {
        background: var(--card);
        border-radius: 12px;
        box-shadow: 0 6px 30px rgba(30, 50, 80, 0.08);
        padding: 28px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 20px;
        color: #0f1724;
      }
      p.lead {
        margin: 0 0 22px;
        color: #475569;
        font-size: 13px;
      }
      label {
        display: block;
        font-size: 13px;
        color: #334155;
        margin-bottom: 8px;
      }
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #e6eefb;
        border-radius: 8px;
        font-size: 14px;
        box-sizing: border-box;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 12px;
      }
      .actions {
        margin-top: 18px;
      }
      button.btn {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 0;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      .muted {
        font-size: 13px;
        color: #64748b;
      }
      .footer {
        margin-top: 16px;
        text-align: center;
        font-size: 13px;
        color: #64748b;
      }
      .inline {
        display: inline-flex;
        gap: 8px;
        align-items: center;
      }
      .remember input {
        margin-right: 8px;
      }
      .or {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 18px 0;
        color: #94a3b8;
      }
      .or::before,
      .or::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e6eefb;
      }
      .socials {
        display: flex;
        gap: 10px;
      }
      .socials button {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #e6eefb;
        background: #fff;
        cursor: pointer;
      }
      @media (max-width: 420px) {
        .container {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Welcome back</h1>
        <p class="lead">Sign in to continue to your account</p>
        <form action="#" method="post" autocomplete="on">
          <div style="margin-bottom: 14px">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="you@example.com"
              required
            />
          </div>
          <div style="margin-bottom: 6px">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="••••••••"
              required
              minlength="6"
            />
          </div>
          <div class="row">
            <label class="inline remember"
              ><input type="checkbox" name="remember" /> Remember me</label
            >
            <a href="#" class="muted">Forgot password?</a>
          </div>
          <div class="actions">
            <button class="btn" type="submit">Sign in</button>
          </div>
          <div class="or">or continue with</div>
          <div class="socials">
            <button type="button" aria-label="Sign in with Google">
              Google
            </button>
            <button type="button" aria-label="Sign in with GitHub">
              GitHub
            </button>
          </div>
          <div class="footer">
            Don't have an account? <a href="#">Create one</a>
          </div>
          <div class="footer">Don't have an y? <a href="#">Create one</a></div>
          <div class="footer">Don't have an z? <a href="#">Create one</a></div>
        </form>
      </div>
    </div>
  </body>
</html>
